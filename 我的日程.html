    // ─── Core: Extract person's schedule ───
    function extractPersonSchedule() {
      const name = document.getElementById('importNameInput').value.trim();
      if (!name) return;
      const loadedFiles = importFiles.filter(f => f.data !== null && f.data.length > 0);
      if (!loadedFiles.length) { showToast('⚠ 文件数据不足'); return; }

      importExtracted = [];

      // Process each file
      loadedFiles.forEach(entry => {
        extractFromFile(name, entry.data, entry.headers, entry.fileName);
      });

      if (!importExtracted.length) {
        const container = document.getElementById('importResult');
        container.style.display = 'block';
        container.innerHTML = `<div class="import-empty"><div class="empty-icon">🔍</div><p>未找到「${escHtml(name)}」的日程安排<br>请检查人名是否正确，或文件格式是否匹配</p></div>`;
        return;
      }

      renderImportResult(name);
    }

    function extractFromFile(name, rows, headers, sourceFileName) {
      const extractedForFile = [];

      // Detect which columns might be dates, names
      let dateColIdx = -1, nameColIdx = -1;
      for (let c = 0; c < headers.length; c++) {
        const h = headers[c].toLowerCase();
        if (/日期|时间|日期安排|安排日期|date|day|日程|值班日期|排班日期/.test(h)) dateColIdx = c;
        if (/姓名|人名|人员|名字|name|person|值班人|员工|参与者/.test(h)) nameColIdx = c;
      }

      // Check if headers are dates (roster/shift format: row=person, col=date)
      const headerDateIndices = [];
      for (let c = 0; c < headers.length; c++) {
        const parsed = tryParseDate(headers[c]);
        if (parsed) headerDateIndices.push({ col: c, date: parsed });
      }

      // ─── Strategy 1: Roster/Shift format (headers are dates, rows are names) ───
      if (headerDateIndices.length >= 2) {
        for (let r = 1; r < rows.length; r++) {
          const row = rows[r];
          if (!row || !row.length) continue;
          // Check all cells in the row for the name
          let nameFound = false;
          for (let c = 0; c < Math.min(row.length, headers.length); c++) {
            const cell = String(row[c] || '').trim();
            if (cell === name || cell.includes(name)) { nameFound = true; break; }
          }
          if (!nameFound) {
            const rowName = String(row[0] || '').trim();
            if (!(rowName.includes(name) || name.includes(rowName))) continue;
          }
          // Find task name column (first non-date column, usually column 0 or 1)
          let taskNameCol = -1;
          for (let c = 0; c < Math.min(row.length, headers.length); c++) {
            const headerIsDate = headerDateIndices.some(hdi => hdi.col === c);
            const cellValue = String(row[c] || '').trim();
            // Task name column: not a date header, has content, looks like a task name
            if (!headerIsDate && cellValue && !cellValue.match(/^\d+$/)) {
              taskNameCol = c;
              break;
            }
          }
          // Extract all date cells for this person
          for (const hdi of headerDateIndices) {
            const cellValue = String(row[hdi.col] || '').trim();
            // Check if this date cell mentions the person
            if (cellValue && cellValue !== '' && cellValue !== '-' && cellValue.includes(name)) {
              let taskName = taskNameCol >= 0 ? mergeMultiLineTaskName(rows, r, taskNameCol) : '';
              extractedForFile.push({
                date: hdi.date,
                title: cleanTaskTitle(taskName || cellValue),
                source: `${sourceFileName} - ${headers[hdi.col]}`, row: r, col: hdi.col, selected: true
              });
            }
          }
          // If no cells explicitly contain the name, extract all non-empty date cells
          if (extractedForFile.length === 0) {
            for (const hdi of headerDateIndices) {
              const cellValue = String(row[hdi.col] || '').trim();
              if (cellValue && cellValue !== '' && cellValue !== '-') {
                let taskName = taskNameCol >= 0 ? mergeMultiLineTaskName(rows, r, taskNameCol) : '';
                extractedForFile.push({
                  date: hdi.date,
                  title: cleanTaskTitle(taskName || cellValue),
                  source: `${sourceFileName} - ${headers[hdi.col]}`, row: r, col: hdi.col, selected: true
                });
              }
            }
          }
          break;
        }
      }

      // ─── Strategy 2: List format (has name column + date column) ───
      if (nameColIdx >= 0 && extractedForFile.length === 0) {
        for (let r = 1; r < rows.length; r++) {
          const row = rows[r];
          if (!row) continue;
          const cellName = String(row[nameColIdx] || '').trim();
          if (cellName.includes(name) || name.includes(cellName)) {
            let dateStr = '';
            if (dateColIdx >= 0) {
              const parsed = tryParseDate(row[dateColIdx]);
              if (parsed) dateStr = parsed;
            }
            if (!dateStr) {
              for (let c = 0; c < row.length; c++) {
                const parsed = tryParseDate(row[c]);
                if (parsed) { dateStr = parsed; break; }
              }
            }
            // Find task name column (not name, not date)
            let taskName = '';
            let taskNameCol = -1;
            for (let c = 0; c < headers.length; c++) {
              if (c === nameColIdx || c === dateColIdx) continue;
              const val = String(row[c] || '').trim();
              if (val && !tryParseDate(val) && val.length > taskName.length) {
                taskName = val;
                taskNameCol = c;
              }
            }
            // Try to merge multi-line task names for PDFs
            if (taskNameCol >= 0) {
              taskName = mergeMultiLineTaskName(rows, r, taskNameCol);
            }
            extractedForFile.push({
              date: dateStr,
              title: cleanTaskTitle(taskName || cellName),
              source: `${sourceFileName} - 行 ${r+1}`, row: r, col: nameColIdx, selected: true
            });
          }
        }
      }

      // ─── Strategy 3: Scan all cells for the name, infer date from context ───
      if (extractedForFile.length === 0) {
        for (let r = 0; r < rows.length; r++) {
          const row = rows[r];
          if (!row) continue;
          for (let c = 0; c < row.length; c++) {
            const cell = String(row[c] || '').trim();
            if (!cell) continue;
            if (cell.includes(name) || name.includes(cell)) {
              let dateStr = '';
              for (let dc = 0; dc < row.length; dc++) {
                const parsed = tryParseDate(row[dc]);
                if (parsed) { dateStr = parsed; break; }
              }
              if (!dateStr && c < headers.length) {
                const parsed = tryParseDate(headers[c]);
                if (parsed) dateStr = parsed;
              }
              if (!dateStr) {
                for (let lookback = 1; lookback <= 3 && r - lookback >= 0; lookback++) {
                  const prevRow = rows[r - lookback];
                  if (!prevRow) continue;
                  for (let dc = 0; dc < prevRow.length; dc++) {
                    const parsed = tryParseDate(prevRow[dc]);
                    if (parsed) { dateStr = parsed; break; }
                  }
                  if (dateStr) break;
                }
              }
              // Find the best task name candidate in this row
              let taskName = '';
              let taskNameCol = -1;
              for (let cc = 0; cc < row.length; cc++) {
                const v = String(row[cc] || '').trim();
                if (v && v !== cell && !tryParseDate(v) && !v.includes(name)) {
                  if (v.length > taskName.length) { taskName = v; taskNameCol = cc; }
                }
              }
              // Try to merge multi-line task names for PDFs
              if (taskNameCol >= 0) {
                taskName = mergeMultiLineTaskName(rows, r, taskNameCol);
              }
              const title = cleanTaskTitle(taskName || cell);
              if (!extractedForFile.some(x => x.row === r)) {
                extractedForFile.push({
                  date: dateStr, title: title,
                  source: `${sourceFileName} - 行 ${r+1}`, row: r, col: c, selected: true
                });
              }
              break;
            }
          }
        }
      }

      // ─── Strategy 4: PDF pure text mode ───
      if (extractedForFile.length === 0) {
        const lines = rows.map(row => row.filter(c => c).join(' ')).filter(l => l.trim());
        const dateLineMap = {};
        for (let i = 0; i < lines.length; i++) {
          const lineDate = tryParseDate(lines[i]);
          if (lineDate) dateLineMap[i] = lineDate;
        }
        for (let i = 0; i < lines.length; i++) {
          const line = lines[i];
          if (line.includes(name)) {
            let dateStr = '';
            for (let j = i; j >= Math.max(0, i - 10); j--) {
              if (dateLineMap[j]) { dateStr = dateLineMap[j]; break; }
            }
            if (!dateStr) dateStr = tryParseDateFromText(line);
            let title = line.replace(name, '').trim();
            title = title.replace(/^[\s|\-—:：,，]+/, '').replace(/[\s|\-—:：,，]+$/, '');
            title = cleanTaskTitle(title);
            if (title) {
              if (!extractedForFile.some(x => x.row === i)) {
                extractedForFile.push({
                  date: dateStr, title: title,
                  source: `${sourceFileName} - 第 ${i+1} 行`, row: i, col: 0, selected: true
                });
              }
            }
          }
        }
      }

      // Merge this file's results into global array
      importExtracted.push(...extractedForFile);
    }

    // ─── Merge multi-line task names from PDF parsing ───
    // PDF text extraction often splits a single cell across multiple rows.
    // This function merges adjacent rows in the same column ONLY when we're
    // confident they are continuations of the same task name.
    //
    // SAFETY RULES (all must pass to merge):
    // 1. Next line is NOT a person assignment (no [数字%] pattern)
    // 2. Next line is NOT a pure date
    // 3. Next line is reasonably short (< 25 chars) - task name fragments are short
    // 4. Current line ends incompletely (no sentence-ending punctuation)
    // 5. Next line starts with a continuation pattern OR current line ends with open bracket/list separator
    function mergeMultiLineTaskName(rows, startRow, colIdx) {
      if (colIdx < 0 || startRow >= rows.length) return '';
      let merged = String(rows[startRow][colIdx] || '').trim();
      if (!merged) return '';

      // Common Chinese continuation prefixes (e.g., "可靠" + "性" = "可靠性")
      const continuationPrefixes = /^[性化型态式率度量力质能]/;
      // True sentence enders
      const sentenceEnders = /[。！？;；]/;
      // List separators - indicate the list continues
      const listSeparators = /[,，、]/;
      // Person assignment pattern: 钱泽铠[50%], 颜碧桃[30%]
      const personPattern = /\[\d+%\]|\(\d+%\)/;

      for (let i = startRow + 1; i < Math.min(rows.length, startRow + 4); i++) {
        const nextRow = rows[i];
        if (!nextRow || colIdx >= nextRow.length) break;
        const nextVal = String(nextRow[colIdx] || '').trim();
        if (!nextVal) break;

        // SAFETY CHECK 1: Skip person assignments (钱泽铠[50%])
        if (personPattern.test(nextVal)) break;

        // SAFETY CHECK 2: Skip pure dates
        if (tryParseDate(nextVal)) break;

        // SAFETY CHECK 3: Skip new task indicators (starts with number like "1. " or "2、")
        if (/^\d+[\.、\s]/.test(nextVal)) break;

        // SAFETY CHECK 4: Next line must be reasonably short (< 25 chars)
        // Long lines are likely complete new entries, not fragments
        if (nextVal.length >= 25) break;

        const lastChar = merged.slice(-1);
        const firstChar = nextVal.charAt(0);

        // Check if current line ends "incompletely"
        const endsWithListSeparator = listSeparators.test(lastChar);
        const endsWithSentenceEnder = sentenceEnders.test(lastChar);
        const endsWithOpenBracket = /[（(]/.test(lastChar);
        const isIncomplete = !endsWithSentenceEnder && (endsWithListSeparator || endsWithOpenBracket);

        // Check if next line looks like a continuation
        const startsWithContinuation = continuationPrefixes.test(firstChar);
        const startsWithClosingBracket = /^[）)]/.test(nextVal);

        // Merge ONLY if:
        // - Current line is incomplete (ends with list separator or open bracket)
        // - AND next line starts with a clear continuation pattern
        const shouldMerge = isIncomplete && (startsWithContinuation || startsWithClosingBracket);

        if (shouldMerge) {
          merged += nextVal;
        } else {
          break;
        }
      }
      return merged;
    }

    // ─── Clean up task title ───
    function cleanTaskTitle(title) {
      if (!title) return '';
      let cleaned = String(title).trim();

      // Remove leading numbers with separators (e.g., "55 | ", "1. ", "2、")
      cleaned = cleaned.replace(/^\s*\d+[\.、\s|｜]+\s*/, '');

      // Remove duration patterns (1 d, 0.5 d, 1天, 2天, 1h, 2h, etc.)
      cleaned = cleaned.replace(/\s*\d+\.?\d*\s*[d天h小时]+\b/gi, '');

      // Remove percentage patterns ([50%], [30%], 50%, etc.)
      cleaned = cleaned.replace(/\[?\d+%\]?/g, '');

      // Remove person assignments with percentages (颜碧桃[50%],乔荣鑫[50%])
      cleaned = cleaned.replace(/[^|｜,，\s]+\[\d+%\]/g, '');
      cleaned = cleaned.replace(/[^|｜,，\s]+\(\d+%\)/g, '');

      // Remove multiple person names separated by commas (keep only if it looks like a task name)
      // Pattern: name1,name2 or name1，name2 (Chinese comma)
      const namePattern = /[^|｜,，\s]{2,4}[,，][^|｜,，\s]{2,4}/;
      if (namePattern.test(cleaned) && cleaned.length < 30) {
        // Likely just names, keep as is
      } else {
        // Remove trailing name lists
        cleaned = cleaned.replace(/[,，]\s*[^|｜,，\s]{2,4}(?:[,，][^|｜,，\s]{2,4})+\s*$/, '');
      }

      // Remove pipe separators and everything after ONLY if it looks like a task list separator
      // Pattern: "任务A | 任务B" or "任务A｜任务B" (pipe with spaces around, or followed by another task-like segment)
      // But NOT "Demo、DIY、博文" where | is inside the task name without surrounding context
      const pipeMatch = cleaned.match(/(.+?)(?:\s*[|｜]\s*(.+))/);
      if (pipeMatch) {
        const before = pipeMatch[1].trim();
        const after = pipeMatch[2].trim();
        // Only truncate if the "after" part looks like another task (not just a continuation)
        // Heuristic: after part is short (< 15 chars) or starts with a verb/task keyword
        const taskKeywords = /^(审核|输出|编写|整理|测试|开发|设计|评审|会议|沟通|确认|提交|发布|更新|维护|支持|协助|配合|跟进|处理|解决|分析|评估|规划|部署|上线|验收|培训|调研|编制|撰写|翻译|校对|检查|归档|备份|迁移|优化|重构|调试|修复|升级|配置|安装|搭建|拆除|采购|盘点|盘点|盘点)/;
        if (after.length < 15 || taskKeywords.test(after) || /^[A-Za-z]/.test(after)) {
          cleaned = before;
        }
        // Otherwise: the | is likely part of the task name itself, keep it
      }

      // Remove common status words
      const statusWords = ['已完成', '进行中', '未开始', '待处理', '延期', 'Done', 'In Progress', 'Todo'];
      statusWords.forEach(word => {
        cleaned = cleaned.replace(new RegExp(word, 'gi'), '');
      });

      // Clean up multiple spaces and trim
      cleaned = cleaned.replace(/\s+/g, ' ').trim();

      // Remove trailing punctuation
      cleaned = cleaned.replace(/[,，;；|｜\-—]+$/g, '');

      return cleaned || title; // Fallback to original if everything was stripped
    }

    function renderImportResult(name) {
      const container = document.getElementById('importResult');
      container.style.display = 'block';

      if (!importExtracted.length) {
        container.innerHTML = `<div class="import-empty"><div class="empty-icon">🔍</div><p>未找到「${escHtml(name)}」的日程安排<br>请检查人名是否正确，或文件格式是否匹配</p></div>`;
        return;
      }

      // Sort by date
      const sorted = [...importExtracted].sort((a,b) => a.date.localeCompare(b.date));

      let html = `
        <div class="import-result-header">
          <div class="import-result-title">📋 「${escHtml(name)}」的日程</div>
          <div class="import-result-count">${importExtracted.length} 条记录</div>
        </div>
        <div class="import-select-all-row">
          <label><input type="checkbox" checked onchange="toggleSelectAll(this.checked)"> 全选/取消全选</label>
        </div>`;

      sorted.forEach((item, i) => {
        const dateLabel = item.date ? item.date : '未识别日期';
        html += `
          <div class="import-item-row">
            <input type="checkbox" ${item.selected?'checked':''} data-idx="${importExtracted.indexOf(item)}" onchange="importExtracted[${importExtracted.indexOf(item)}].selected=this.checked">
            <div class="item-date">${escHtml(dateLabel)}</div>
            <div class="item-content">
              ${escHtml(item.title)}
              <div class="item-source">来源: ${escHtml(item.source)}</div>
            </div>
          </div>`;
      });

      html += `
        <div class="import-apply-row">
          <button class="btn-sm btn-import" onclick="applyImportedTasks()">📥 导入选中项到日程</button>
          <button class="btn-sm btn-outline" onclick="clearImportFile()">清除并重新导入</button>
        </div>`;

      container.innerHTML = html;
    }

    function toggleSelectAll(checked) {
      importExtracted.forEach(item => item.selected = checked);
      document.querySelectorAll('.import-item-row input[type="checkbox"]').forEach(cb => cb.checked = checked);
    }

    // ─── Extract project prefix from filename ───
    function extractProjectPrefix(filename) {
      if (!filename) return '';
      // Remove extension
      let name = filename.replace(/\.[^.]+$/, '');
      // Remove date patterns (20260420, 2026-04-20, etc.)
      name = name.replace(/\d{4}[-.]?\d{2}[-.]?\d{2}/g, '');
      // Find cutoff keywords: 模组, 项目, 计划, schedule, project, plan
      const cutoffMatch = name.match(/^(.*?)(模组|项目|计划|schedule|project|plan)/i);
      if (cutoffMatch) {
        let prefix = cutoffMatch[1].trim();
        // Clean up trailing symbols
        prefix = prefix.replace(/[-_和与跟\s]+$/g, '');
        return prefix;
      }
      // If no cutoff keyword, return first segment before common separators
      const firstSegment = name.split(/[-_和与跟\s]+/)[0];
      return firstSegment.trim();
    }

    function applyImportedTasks() {
      const selected = importExtracted.filter(item => item.selected);
      if (!selected.length) { showToast('⚠ 请至少选择一条记录'); return; }

      let added = 0, skipped = 0;
      selected.forEach(item => {
        const dateKey = item.date || getDateKey(new Date());
        // Extract file name from source
        const sourceFile = (item.source || '').split(' - ')[0] || '未知文件';
        const projectPrefix = extractProjectPrefix(sourceFile);
        // Build title with project prefix
        let title = item.title;
        if (projectPrefix && !title.includes(projectPrefix)) {
          title = `${projectPrefix}${title}`;
        }
        // Check for duplicate
        const exists = tasks.some(t => t.date === dateKey && t.title === title);
        if (exists) { skipped++; return; }
        tasks.push({
          id: (Date.now() + added).toString() + '_' + Math.random().toString(36).slice(2,6),
          date: dateKey,
          title: title,
          tag: 'imported',
          priority: 'medium',
          note: `从文件「${sourceFile}」导入`,
          completed: false,
          createdAt: Date.now()
        });
        added++;
      });

      saveTasks();
      render();
      showToast(`✅ 已导入 ${added} 条任务${skipped ? `，跳过 ${skipped} 条重复` : ''}`);

      // Switch to month view to see results
      setTimeout(() => switchView('month'), 800);
    }

    // ─── Date parsing helpers ───
    function tryParseDate(val) {
      if (!val) return '';
      if (val instanceof Date && !isNaN(val)) return getDateKey(val);
      const s = String(val).trim();
      if (!s || s === '-') return '';
      let m = s.match(/^(\d{4})[\/\-\.](\d{1,2})[\/\-\.](\d{1,2})/);
      if (m) return `${m[1]}-${m[2].padStart(2,'0')}-${m[3].padStart(2,'0')}`;
      m = s.match(/^(\d{1,2})[\/\-](\d{1,2})$/);
      if (m) { const y = new Date().getFullYear(); return `${y}-${m[1].padStart(2,'0')}-${m[2].padStart(2,'0')}`; }
      m = s.match(/(\d{1,2})月(\d{1,2})[日号]/);
      if (m) { const y = new Date().getFullYear(); return `${y}-${m[1].padStart(2,'0')}-${m[2].padStart(2,'0')}`; }
      const num = Number(s);
      if (!isNaN(num) && num > 30000 && num < 60000) { const d = new Date((num-25569)*86400000); return getDateKey(d); }
      return '';
    }

    // Extract date from within a longer text line (e.g. "5月12日 张三 值班")
    function tryParseDateFromText(text) {
      if (!text) return '';
      // 2026年5月12日
      let m = text.match(/(\d{4})年(\d{1,2})月(\d{1,2})[日号]/);
      if (m) return `${m[1]}-${m[2].padStart(2,'0')}-${m[3].padStart(2,'0')}`;
      // X月X日
      m = text.match(/(\d{1,2})月(\d{1,2})[日号]/);
      if (m) { const y = new Date().getFullYear(); return `${y}-${m[1].padStart(2,'0')}-${m[2].padStart(2,'0')}`; }
      // YYYY-MM-DD or YYYY/MM/DD embedded in text
      m = text.match(/(\d{4})[\/\-](\d{1,2})[\/\-](\d{1,2})/);
      if (m) return `${m[1]}-${m[2].padStart(2,'0')}-${m[3].padStart(2,'0')}`;
      // MM-DD or MM/DD
      m = text.match(/(?:^|[^\d])(\d{1,2})[\/\-](\d{1,2})(?:[^\d]|$)/);
      if (m) { const y = new Date().getFullYear(); return `${y}-${m[1].padStart(2,'0')}-${m[2].padStart(2,'0')}`; }
      return '';
    }

    function formatFileSize(bytes) {
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1048576) return (bytes/1024).toFixed(1) + ' KB';
      return (bytes/1048576).toFixed(1) + ' MB';
    }

    // ─── Event Listeners ───
    document.querySelectorAll('.tag-option').forEach(el => {
      el.addEventListener('click', () => { document.querySelectorAll('.tag-option').forEach(e => e.classList.remove('selected')); el.classList.add('selected'); el.querySelector('input').checked = true; });
    });
    document.querySelectorAll('.priority-option').forEach(el => {
      el.addEventListener('click', () => { document.querySelectorAll('.priority-option').forEach(e => e.classList.remove('selected')); el.classList.add('selected'); el.querySelector('input').checked = true; });
    });
    document.addEventListener('keydown', e => {
      if ((e.key==='n'||e.key==='N') && document.activeElement.tagName!=='INPUT' && document.activeElement.tagName!=='TEXTAREA') openModal();
      if (e.key === 'Escape') closeModal();
    });

    // ─── Utilities ───
    function isSameDay(a, b) { return a.getFullYear()===b.getFullYear() && a.getMonth()===b.getMonth() && a.getDate()===b.getDate(); }
    function escHtml(str) { const d = document.createElement('div'); d.textContent = str; return d.innerHTML; }
    function showToast(msg) { const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2200); }

    // ─── Boot ───
    init();
  </script>
</body>
</html>
